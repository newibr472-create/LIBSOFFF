name: Build libbypass.so
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Build
        run: |
          cd build_so
          ${{ steps.ndk.outputs.ndk-path }}/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            -j$(nproc)

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libbypass-arm64
          path: build_so/libs/arm64-v8a/libbypass.so
